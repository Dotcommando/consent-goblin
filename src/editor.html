<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Edit consent mockup</title>
  <link rel="stylesheet" href="./ui.css" />
</head>
<body class="page page-editor">
<main class="editor-shell">
  <header class="editor-header">
    <div class="editor-header__eyebrow">Mockup Tool</div>
    <h1 class="editor-header__title">Edit consent mockup</h1>
    <p class="editor-header__text">
      Customize the dialog mockup and push updates to any open preview on the page.
    </p>
  </header>

  <section class="editor-section">
    <div class="section-title">Templates</div>
    <div id="presetList" class="preset-list"></div>
  </section>

  <section class="editor-section">
    <label class="field">
      <span class="field__label">Site label</span>
      <input id="siteLabelInput" class="input" type="text" maxlength="120" />
    </label>

    <label class="field">
      <span class="field__label">Dialog title</span>
      <input id="titleInput" class="input" type="text" maxlength="180" />
    </label>

    <label class="field">
      <span class="field__label">Dialog items</span>
      <textarea id="itemsInput" class="textarea" rows="10"></textarea>
    </label>

    <label class="field">
      <span class="field__label">Secondary button</span>
      <input id="secondaryActionInput" class="input" type="text" maxlength="40" />
    </label>

    <label class="field">
      <span class="field__label">Primary button</span>
      <input id="primaryActionInput" class="input" type="text" maxlength="40" />
    </label>
  </section>

  <footer class="editor-footer">
    <button id="resetButton" class="button button-secondary" type="button">Reset</button>
    <button id="applyButton" class="button button-primary" type="button">Update mockup</button>
  </footer>
</main>

<script src="./editor.js"></script>
</body>
</html>
