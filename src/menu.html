<!doctype html>
<html lang="en">
<head>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Goblin Consent</title>
  <link rel="stylesheet" href="./ui.css" />
</head>
<body class="page page-menu">
<main class="menu-shell">
  <div class="brand-card">
    <div class="brand-mark"></div>
    <div class="brand-copy">
      <div class="brand-title">Goblin Consent</div>
      <div class="brand-subtitle">Fake consent dialogs for screenshots</div>
    </div>
  </div>

  <div class="menu-list">
    <button id="showConsentButton" class="menu-item" type="button">
      <span class="menu-item__title">Show consent</span>
      <span class="menu-item__hint">Open the fake consent dialog</span>
    </button>

    <button id="editConsentButton" class="menu-item" type="button">
      <span class="menu-item__title">Edit consent dialog</span>
      <span class="menu-item__hint">Open the right-side editor panel</span>
    </button>
  </div>
</main>

<script src="./menu.js"></script>

</html>
